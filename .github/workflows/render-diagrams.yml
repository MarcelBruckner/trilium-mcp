name: Render diagrams

# Render the PlantUML sources under docs/ to PNG and commit the results back,
# so the images embedded in the README always match their .puml source.

on:
  push:
    branches: [main]
    paths:
      - "docs/**.puml"
      - ".github/workflows/render-diagrams.yml"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: render-diagrams-${{ github.ref }}
  cancel-in-progress: true

jobs:
  render:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install PlantUML
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends plantuml graphviz

      - name: Render diagrams
        run: plantuml -tpng docs/*.puml

      - name: Commit rendered PNGs
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "docs: re-render PlantUML diagrams [skip ci]"
          file_pattern: "docs/*.png"
